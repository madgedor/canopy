version: '3.8'

services:
  canopy:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    container_name: canopy-node
    restart: unless-stopped
    ports:
      - "${P2P_PORT:-8080}:8080"
      - "${RPC_PORT:-50051}:50051"
      - "${API_PORT:-8081}:8081"
    volumes:
      - canopy-data:/root/.canopy
    environment:
      - CANOPY_ENV=${CANOPY_ENV:-mainnet}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - canopy-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  canopy-auto-update:
    build:
      context: .
      dockerfile: .docker/auto-update/Dockerfile
    container_name: canopy-auto-update
    restart: unless-stopped
    depends_on:
      - canopy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - canopy-data:/root/.canopy
    environment:
      - UPDATE_INTERVAL=${UPDATE_INTERVAL:-3600}
      - CANOPY_CONTAINER=canopy-node
      - GITHUB_REPO=${GITHUB_REPO:-canopy-network/canopy}
    networks:
      - canopy-net

volumes:
  canopy-data:
    driver: local

networks:
  canopy-net:
    driver: bridge
